<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gym and Tonic - Contact</title>
  <link rel="stylesheet" href="styles.css">
  <script src="app.js" defer></script>
</head>
<body>
  <header>
    <img src="assets/images/logo.png" alt="Gym and Tonic Logo" class="logo">
    <nav>
      <ul>
        <li><a href="index.html" data-i18n="home">Home</a></li>
        <li><a href="coaches.html" data-i18n="coaches">Coaches</a></li>
        <li><a href="features.html" data-i18n="features">Features</a></li>
        <li><a href="about.html" data-i18n="about">About</a></li>
        <li><a href="contact.html" data-i18n="contact">Contact</a></li>
      </ul>
    </nav>
  </header>

  <section class="contact">
    <h1 data-i18n="contact_title">Get in Touch</h1>
    <p data-i18n="contact_text">Have questions or want to book a session? Fill out the form below, and our team will respond promptly.</p>
    <form>
      <label data-i18n="form_name">Name:</label>
      <input type="text" name="name" required>

      <label data-i18n="form_email">Email:</label>
      <input type="email" name="email" required>

      <label data-i18n="form_message">Message:</label>
      <textarea name="message" rows="5" required></textarea>

      <button type="submit" data-i18n="form_submit">Send Message</button>
    </form>
  </section>

  <footer>
    <p>&copy; 2026 Gym and Tonic</p>
  </footer>
</body>
</html>
